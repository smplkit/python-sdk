name: Regenerate Client

on:
  repository_dispatch:
    types: [openapi-spec-changed]

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openapi-python-client

      - name: Update spec file
        run: |
          SERVICE=${{ github.event.client_payload.service }}
          echo '${{ github.event.client_payload.spec }}' | python -m json.tool > "openapi/${SERVICE}.json"

      - name: Regenerate client
        run: bash scripts/generate.sh

      - name: Run tests
        run: |
          pip install -e ".[dev]"
          pytest

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: regenerate ${{ github.event.client_payload.service }} client"
          title: "chore: regenerate ${{ github.event.client_payload.service }} client from updated OpenAPI spec"
          body: |
            Automated client regeneration triggered by OpenAPI spec change in the ${{ github.event.client_payload.service }} service.

            Review the generated diff carefully for breaking changes before merging.
          branch: "chore/regenerate-${{ github.event.client_payload.service }}-client"
          delete-branch: true
