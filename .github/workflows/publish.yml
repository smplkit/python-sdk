name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes semantic-release

      - name: Determine version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build tools
        if: steps.semantic.outputs.new_release_published == 'true'
        run: pip install build

      - name: Build package
        if: steps.semantic.outputs.new_release_published == 'true'
        run: python -m build

      - name: Verify package name and version
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          ls dist/
          ls dist/smplkit_sdk-*.whl || { echo "ERROR: Expected smplkit_sdk wheel not found"; exit 1; }

      - name: Publish to PyPI
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Release summary
        run: |
          echo "## Release" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.semantic.outputs.new_release_published }}" = "true" ]; then
            echo "**Version:** v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Published to PyPI:** yes" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No release warranted by commits since last release." >> "$GITHUB_STEP_SUMMARY"
          fi
