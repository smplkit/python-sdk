name: Publish to PyPI

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for hatch-vcs to read tags

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify package name and version
        run: |
          ls dist/
          # Verify the package is named smplkit_sdk, not smplkit
          ls dist/smplkit_sdk-*.whl || { echo "ERROR: Expected smplkit_sdk wheel not found"; exit 1; }

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
