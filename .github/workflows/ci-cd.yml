name: CI/CD

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        run: pytest --cov=smplkit --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  ci-gate:
    if: always()
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi

  release:
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Record latest tag before release
        id: before
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes semantic-release

      - name: Check if a new release was created
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --jq '.[0].name' 2>/dev/null || echo '')
          if [ "$LATEST_TAG" != "${{ steps.before.outputs.tag }}" ] && [ -n "$LATEST_TAG" ]; then
            VERSION="${LATEST_TAG#v}"
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "New release detected: ${LATEST_TAG}"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No new release."
          fi

      - name: Set up Python
        if: steps.check.outputs.released == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build tools
        if: steps.check.outputs.released == 'true'
        run: pip install build

      - name: Build package
        if: steps.check.outputs.released == 'true'
        run: python -m build

      - name: Verify package name and version
        if: steps.check.outputs.released == 'true'
        run: |
          ls dist/
          ls dist/smplkit_sdk-*.whl || { echo "ERROR: Expected smplkit_sdk wheel not found"; exit 1; }

      - name: Publish to PyPI
        if: steps.check.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Summary
        run: |
          echo "## Publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check.outputs.released }}" = "true" ]; then
            echo "**Version:** v${{ steps.check.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Published to PyPI:** yes" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No release warranted by commits since last release." >> "$GITHUB_STEP_SUMMARY"
          fi
