name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
    inputs:
      manual_version:
        description: "Force version"
        required: false
        default: ""

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the dependency closure (runtime + dev tooling) WITHOUT
          # installing smplkit-sdk itself. Tests import smplkit from src/ via
          # `pythonpath = ["src"]` in pyproject.toml (org "no editable installs
          # — anywhere" rule); the package must not live in the venv, editable
          # or otherwise. Building pulls every dependency, then we drop the
          # package, leaving only its deps for the src-tree import to resolve.
          pip install ".[dev]"
          pip uninstall -y smplkit-sdk

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the dependency closure (runtime + dev tooling) WITHOUT
          # installing smplkit-sdk itself. Tests import smplkit from src/ via
          # `pythonpath = ["src"]` in pyproject.toml (org "no editable installs
          # — anywhere" rule); the package must not live in the venv, editable
          # or otherwise. Building pulls every dependency, then we drop the
          # package, leaving only its deps for the src-tree import to resolve.
          pip install ".[dev]"
          pip uninstall -y smplkit-sdk

      - name: Test
        run: pytest --cov=smplkit --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  ci-gate:
    if: always()
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: smplkit/.github-public/actions/ci-gate@main
        with:
          needs: ${{ toJson(needs) }}

  release:
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare release
        id: prep
        uses: smplkit/.github-public/actions/sdk-release-prepare@main
        with:
          manual_version: ${{ github.event.inputs.manual_version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.prep.outputs.released == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build tools
        if: steps.prep.outputs.released == 'true'
        run: pip install build

      - name: Build package
        if: steps.prep.outputs.released == 'true'
        run: python -m build

      - name: Verify package name and version
        if: steps.prep.outputs.released == 'true'
        run: |
          ls dist/
          ls dist/smplkit_sdk-*.whl || { echo "ERROR: Expected smplkit_sdk wheel not found"; exit 1; }

      - name: Publish to PyPI
        if: steps.prep.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Summary
        run: |
          echo "## Publish" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.prep.outputs.released }}" = "true" ]; then
            echo "**Version:** v${{ steps.prep.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Published to PyPI:** yes" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No release warranted by commits since last release." >> "$GITHUB_STEP_SUMMARY"
          fi
