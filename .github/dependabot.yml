# Dependabot for python-sdk.
#
# Every dependency bump is a `fix:` — a version change is a real
# change to the release inputs and warrants a new patch publish via
# semantic-release. Per the SDK commit-message lockdown in
# ~/.claude/CLAUDE.md, `fix:` is the maximum bump permitted.
#
# Runtime and dev pip deps are grouped separately so each weekly
# cycle yields at most two pip PRs (plus one for actions) rather
# than a flood. Major bumps land as individual PRs for review.
#
# Patch + minor bumps auto-merge on green CI via the sibling
# .github/workflows/dependabot-auto-merge.yml workflow.

version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "fix"
      include: "scope"
    open-pull-requests-limit: 10
    # SDK floor protection: only bump constraints when strictly
    # necessary. `>=X` runtime ranges in pyproject.toml stay put when
    # a new compatible release lands; `==Y` dev pins still bump
    # because exact pins are by definition out-of-date the moment a
    # new release exists. Keeps the customer-facing compat floor
    # stable while still letting the dev toolchain track current.
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
      - python
    groups:
      runtime:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "fix"
      include: "scope"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        update-types:
          - minor
          - patch
