# Template: Update SDK spec workflow
#
# Add this workflow to each source repo (smplkit/app, smplkit/config,
# smplkit/flags, smplkit/logging) to push OpenAPI spec changes to
# the python-sdk repo.
#
# Prerequisites:
#   - MIKES_PAT secret: a PAT (owned by notmikegorman) with
#     contents:write and pull-requests:write on smplkit/python-sdk.
#     Can be an org secret scoped to private repos only.
#
# The python-sdk repo's auto-merge workflow will merge the PR once
# CI passes, provided the PR author matches the PAT owner and the
# branch starts with "regen/".

name: Update SDK spec

on:
  push:
    branches: [main]
    paths:
      - 'openapi/openapi.json'

jobs:
  update-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout python-sdk
        uses: actions/checkout@v4
        with:
          repository: smplkit/python-sdk
          token: ${{ secrets.MIKES_PAT }}
          path: python-sdk

      - name: Update spec file
        run: cp openapi/openapi.json python-sdk/openapi/${{ github.event.repository.name }}.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: python-sdk
        run: pip install -e '.[dev]'

      - name: Regenerate clients
        working-directory: python-sdk
        run: make generate

      - name: Configure git
        working-directory: python-sdk
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create PR
        working-directory: python-sdk
        run: |
          BRANCH="regen/${{ github.event.repository.name }}-$(date +%s)"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — spec is already up to date."
            exit 0
          fi
          git commit -m "fix: regenerate ${{ github.event.repository.name }} client from updated spec"
          git push origin "$BRANCH"
          gh pr create \
            --title "fix: regenerate ${{ github.event.repository.name }} client" \
            --body "Automated spec update from \`${{ github.event.repository.name }}\` repo (commit ${{ github.sha }})." \
            --base main
        env:
          GH_TOKEN: ${{ secrets.MIKES_PAT }}
